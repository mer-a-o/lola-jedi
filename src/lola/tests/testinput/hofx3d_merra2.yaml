# Single MERRA-2 analysis or forecast state.
# 'variables' uses CF/JEDI names; 'variable name map' maps each CF name to
# the name as it appears in the MERRA-2 NetCDF file.
state:
  date: '2020-12-15T00:00:00Z'
  variables:
    - air_temperature
    - eastward_wind
    - northward_wind
    - air_pressure
  filepath: /home/maryamabdi/container/merra-2/MERRA2_400.inst3_3d_asm_Nv.20201215_t0
  netcdf extension: nc4
  check dimensions: false
  variable name map:
    air_temperature: T
    eastward_wind: U
    northward_wind: V
    air_pressure: PL

# Observation spaces — one entry per instrument/platform
observations:
  observers:
  - obs space:
      name: Radiosonde
      obsdatain:
        engine:
          type: H5File
          obsfile: /home/maryamabdi/container/jedi-bundle/fv3-jedi-data/testinput_tier_1/obs/sondes_obs_2020121500_m.nc4
      obsdataout:
        engine:
          type: H5File
          obsfile: /home/maryamabdi/container/merra-2/outputs/hofx3d_sondes_output.nc
      simulated variables:
        - airTemperature
    obs operator:
      name: VertInterp
      vertical coordinate: air_pressure
      observation vertical coordinate: pressure
      observation vertical coordinate group: MetaData
      interpolation method: log-linear
