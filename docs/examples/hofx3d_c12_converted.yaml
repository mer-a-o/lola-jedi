  model top pressure: 0.01

# Single MERRA-2 analysis or forecast state.
# 'variables' uses CF/JEDI names; 'variable name map' maps each CF name to
# the name as it appears in the MERRA-2 NetCDF file.
state:
  date: '2023-08-10T00:00:00Z'
  variables:
    - air_temperature
    - volume_mixing_ratio_of_no2
    - volume_mixing_ratio_of_o3
    - volume_mixing_ratio_of_no
    - volume_mixing_ratio_of_co
    - air_pressure_thickness
    - air_pressure_at_surface

  filepath: /discover/nobackup/mabdiosk/garage/applications/LOLA/hofx/inputs/bkg/converttolatlon.7.5deg.fixed..2023-08-10T00:00:00Z.latlon.modelLevels
  netcdf extension: nc
  # lat goes from +90 to -90
  latitude south to north: false
  check dimensions: false

  variable name map:
    air_temperature: air_temperature
    volume_mixing_ratio_of_no2: volume_mixing_ratio_of_no2
    volume_mixing_ratio_of_no: volume_mixing_ratio_of_no
    volume_mixing_ratio_of_o3: volume_mixing_ratio_of_o3
    volume_mixing_ratio_of_co: volume_mixing_ratio_of_co
    air_pressure_thickness: air_pressure_thickness
    air_pressure_at_surface: air_pressure_at_surface

observations:
  observers:
  - obs space:
      name: tempo_no2_tropo
      obsdatain:
        engine:
          obsfile: /discover/nobackup/mabdiosk/garage/applications/LOLA/hofx/inputs/from_swell/tempo_no2_tropo.20230809T210000Z_small.nc4
          type: H5File
      obsdataout:
        engine:
          allow overwrite: true
          obsfile: outputs/fb.lola.hofx3d.convertstate.fixed.tempo_no2_tropo.20230809T210000Z_c12.nc4
          type: H5File
      observed variables:
      - nitrogendioxideColumn
      simulated variables:
      - nitrogendioxideColumn
    obs operator:
      name: ColumnRetrieval
      isApriori: false
      isAveragingKernel: true
      nlayers_retrieval: 72
      stretchVertices: topbottom
      tracer variables:
      - volume_mixing_ratio_of_no2
