# HofX3D template for lola.
# Requires: a MERRA-2 state file (NetCDF) and IODA observation files.
# Run with: lola_hofx3d.x hofx3d.yaml

time window:
  begin: '2023-08-09T21:00:00Z'
  length: PT6H

geometry:
  function space: StructuredColumns
  grid:
    type: regular_lonlat
    # C12
    nx: 48
    ny: 25
  levels: 72
  levels are top down: true
  levels per variable:
    - name: air_temperature
      levels: 72
    - name: volume_mixing_ratio_of_no2
      levels: 72
    - name: volume_mixing_ratio_of_o3
      levels: 72
    - name: volume_mixing_ratio_of_no
      levels: 72
    - name: volume_mixing_ratio_of_co
      levels: 72
    - name: air_pressure_thickness
      levels: 72
    - name: air_pressure_at_surface
      levels: 1
    - name: air_pressure_levels
